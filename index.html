<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">  
</head>

<body class="bg-gray-100 min-h-screen flex items-start justify-center p-3">

    <div class="app max-w-3xl w-full bg-white rounded-xl p-4 sm:p-6 space-y-6">

        <section id="resumo">
            <div class="grid grid-cols-1 sm:grid-cols-1 gap-3">

                <div class="bg-gray-50 p-4 rounded-lg text-center">
                    <p class="text-gray-500 text-sm">Saldo Atual</p>
                    <p id="balance" class="text-2xl font-bold text-blue-600">€1200</p>
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-2 gap-3">

                    <div class="bg-gray-50 p-4 rounded-lg text-center">
                        <p class="text-gray-500 text-sm">Entradas</p>
                        <p id="total-income" class="text-2xl font-bold text-green-600">€1500</p>
                    </div>

                    <div class="bg-gray-50 p-4 rounded-lg text-center">
                        <p class="text-gray-500 text-sm">Despesas</p>
                        <p id="total-expense" class="text-2xl font-bold text-red-600">€300</p>
                    </div>
                </div>              
            </div>
            <button
                id="btn-new"
                type="submit"
                class="w-full mt-6 bg-gray-800 text-white py-2 rounded-lg hover:bg-gray-700 transition">
                    Nova Transação
            </button>
        </section>

        <section
            id="form-transacoes"
            class="bg-gray-100 w-full absolute top-0 left-0 h-full p-4 flex flex-col justify-center items-center hidden">

            <h2 class="text-lg sm:text-xl font-bold mb-3 text-center">Nova Transação</h2>
            <form
                class="space-y-3 w-full md:w-[700px] flex-col"
                id="form-transactions">
                <button
                    id="close"
                    type="button"
                    class="p-4 absolute top-0 right-0">
                    X
                </button>

                <input id="inp-name" type="text" placeholder="Nome da transação" class="w-full border rounded-lg p-2" autofocus required autocomplete="off">
                <input id="inp-date" type="date" class="w-full border rounded-lg p-2">
                <select id="tipo" class="w-full border rounded-lg p-2">
                    <option value="">Selecione Tipo</option>
                    <option value="receita">Receita</option>
                    <option value="despesa">Despesa</option>
                </select>

                <div id="categoriaContainer" class="hidden">
                    <select id="categoria" class="w-full border rounded-lg p-2">
                        <option>Categoria</option>
                        <option>Alimentação</option>
                        <option>Transporte</option>
                        <option>Moradia</option>
                        <option>Lazer</option>
                        <option>Saúde</option>
                    </select>
                </div>
            
                <input id="inp-amount" type="number" step="0.01" placeholder="Montante" class="w-full border rounded-lg p-2" required>
                <button type="submit" class="w-full bg-gray-800 text-white py-2 rounded-lg hover:bg-gray-700 transition">Adicionar</button>
            </form>
        </section>

        <section id="transacoes">
            <h2 class="text-lg sm:text-xl font-bold mb-3 text-center">Transações Recentes</h2>
            <ul id="transactions-list" class="space-y-3"></ul>
        </section>    
</div>

<script src="script.js"></script>
</body>
</html>
